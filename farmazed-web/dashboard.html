<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard | Farmazed</title>
<link rel="icon" type="image/png" href="src/images/favicon_Farzed.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Open+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary:      #1572b0;
  --primary-dark: #0d4f80;
  --primary-cta:  #2190d7;
  --green:        #27a060;
  --amber:        #BA7517;
  --red:          #c0392b;
  --gray:         #888780;
  --bg:           #f0f4f8;
  --card:         #ffffff;
  --border:       #dde3ea;
  --text:         #1c2b3a;
  --text-muted:   #6b7a8d;
  --topbar-h:     58px;
  --font-ui:      'Open Sans', sans-serif;
  --font-head:    'Oswald', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; }
a { text-decoration: none; color: inherit; }

/* ── TOPBAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--primary-dark); display: flex; align-items: center;
  justify-content: space-between; padding: 0 24px; z-index: 100;
  border-bottom: 2px solid var(--primary);
}
.tb-brand { display: flex; align-items: center; gap: 12px; }
.tb-brand img { height: 36px; width: auto; object-fit: contain; }
.tb-brand-text { font-family: var(--font-head); line-height: 1.2; }
.tb-brand-name { font-size: 1.15rem; font-weight: 400; color: #fff; letter-spacing: 0.04em; }
.tb-brand-sub  { font-size: 0.58rem; color: rgba(255,255,255,0.55); letter-spacing: 0.12em; text-transform: uppercase; }
.tb-right { display: flex; align-items: center; gap: 18px; }
.tb-status { font-size: 0.68rem; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-align: right; }
.tb-status span { display: block; }
.tb-user { display: flex; align-items: center; gap: 8px; }
.tb-user-name { font-size: 0.82rem; color: #fff; font-weight: 600; }
.tb-user-role { font-size: 0.68rem; color: rgba(255,255,255,0.6); }
.tb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 2px rgba(39,160,96,0.3); }
.tb-logout { font-size: 0.72rem; color: rgba(255,255,255,0.5); cursor: pointer; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; transition: all 0.2s; }
.tb-logout:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

/* ── MAIN ── */
#main { margin-top: var(--topbar-h); padding: 24px; max-width: 1320px; margin-left: auto; margin-right: auto; }

/* ── SECTION TITLES ── */
.sec-title {
  font-family: var(--font-head); font-size: 0.78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.sec-title .badge-norm {
  font-family: var(--font-ui); font-size: 0.65rem; font-weight: 700;
  background: rgba(186,117,23,0.12); color: var(--amber);
  padding: 2px 7px; border-radius: 10px; letter-spacing: 0.04em;
}

/* ── METRICS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 18px; }
.metric-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  padding: 20px 22px; position: relative; overflow: hidden;
}
.metric-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.metric-card.green::before { background: var(--green); }
.metric-card.amber::before { background: var(--amber); }
.metric-card.red::before   { background: var(--red); }
.metric-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.metric-value { font-family: var(--font-head); font-size: 2.2rem; font-weight: 400; color: var(--text); line-height: 1; margin-bottom: 6px; }
.metric-delta { font-size: 0.72rem; }
.metric-delta.green { color: var(--green); }
.metric-delta.amber { color: var(--amber); }
.metric-delta.red   { color: var(--red); }

/* ── ALERT BANNER ── */
#alert-container { margin-bottom: 18px; }
.alert-item {
  display: flex; align-items: flex-start; gap: 12px;
  background: #fffbf2; border-left: 3px solid var(--amber);
  border-radius: 0 4px 4px 0; padding: 13px 16px; margin-bottom: 8px;
  font-size: 0.82rem; line-height: 1.5;
}
.alert-icon { color: var(--amber); font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.alert-title { font-weight: 700; color: var(--amber); display: block; margin-bottom: 2px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
.alert-close { margin-left: auto; cursor: pointer; color: var(--text-muted); font-size: 1rem; flex-shrink: 0; }
.alert-close:hover { color: var(--text); }

/* ── PIPELINE ── */
#pipeline-section { margin-bottom: 18px; }
.pipeline-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; }
.pipeline-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 0;
  padding: 16px 18px; cursor: pointer; transition: box-shadow 0.2s;
  position: relative;
}
.pipeline-card:first-child { border-radius: 6px 0 0 6px; }
.pipeline-card:last-child  { border-radius: 0 6px 6px 0; }
.pipeline-card:not(:last-child)::after {
  content: '›'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
  font-size: 1.4rem; color: var(--border); z-index: 1; font-weight: 300;
}
.pipeline-card.active { box-shadow: 0 0 0 2px var(--phase-color, var(--primary)) inset; }
.pipeline-card:hover { background: #fafcff; }
.pipeline-phase-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%; font-size: 0.65rem; font-weight: 700;
  background: var(--phase-color, var(--gray)); color: #fff; margin-bottom: 8px;
}
.pipeline-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; }
.pipeline-name { font-family: var(--font-head); font-size: 0.82rem; font-weight: 400; color: var(--text); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.pipeline-count { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; }
.pipeline-count strong { font-size: 1.1rem; color: var(--text); font-family: var(--font-head); font-weight: 400; }
.pipeline-bar-bg { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
.pipeline-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

/* ── TWO COL ── */
.two-col { display: grid; grid-template-columns: 60fr 40fr; gap: 14px; margin-bottom: 18px; }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }

/* Categories */
.cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.cat-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.cat-name { font-size: 0.78rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar-bg { flex: 2; height: 5px; background: #eef0f2; border-radius: 2px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.cat-count { font-size: 0.72rem; color: var(--text-muted); width: 24px; text-align: right; flex-shrink: 0; }

/* Activity feed */
.activity-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; gap: 10px; align-items: flex-start; }
.activity-item:last-child { border-bottom: none; }
.act-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.act-code { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600; color: var(--primary); }
.act-product { font-size: 0.78rem; color: var(--text); margin-bottom: 2px; }
.act-meta { font-size: 0.68rem; color: var(--text-muted); }
.act-badge {
  display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 1px 7px;
  border-radius: 10px; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.04em;
}

/* ── QUICK MODULES ── */
#modules-section { margin-bottom: 18px; }
.modules-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.module-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  padding: 18px 20px; display: flex; flex-direction: column; gap: 6px;
  transition: box-shadow 0.2s, border-color 0.2s; cursor: pointer;
}
.module-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: var(--primary-cta); }
.module-icon {
  width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 1.1rem; margin-bottom: 4px;
}
.module-name { font-family: var(--font-head); font-size: 0.9rem; font-weight: 400; color: var(--text); text-transform: uppercase; letter-spacing: 0.03em; }
.module-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; flex: 1; }
.module-link { font-size: 0.72rem; font-weight: 700; color: var(--primary-cta); }

/* ── TABLE SECTION ── */
#table-section { margin-bottom: 24px; }
.table-panel { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.table-header { padding: 16px 20px 0; border-bottom: 1px solid var(--border); }
.table-tabs { display: flex; gap: 0; }
.tab-btn {
  padding: 10px 16px; font-size: 0.75rem; font-weight: 600; border: none;
  background: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent;
  transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover:not(.active) { color: var(--text); }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 820px; }
thead tr { background: #f8fafb; }
th {
  padding: 10px 14px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 11px 14px; font-size: 0.78rem; border-bottom: 1px solid #f3f4f5; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafcff; }
.td-code { font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600; color: var(--primary); }
.td-venc { font-size: 0.75rem; }
.td-venc.warn { color: var(--red); font-weight: 700; }
.pill {
  display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 2px 9px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
}
.cat-badge {
  display: inline-block; font-size: 0.65rem; font-weight: 600; padding: 2px 8px;
  border-radius: 3px; white-space: nowrap;
}
.actions-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; padding: 2px 6px; border-radius: 3px; position: relative; }
.actions-btn:hover { background: #f0f0f0; color: var(--text); }
.dropdown {
  position: absolute; right: 0; top: 100%; background: var(--card);
  border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  min-width: 190px; z-index: 50; display: none;
}
.dropdown.open { display: block; }
.dropdown a {
  display: block; padding: 9px 14px; font-size: 0.75rem; color: var(--text);
  border-bottom: 1px solid #f5f5f5; transition: background 0.15s;
}
.dropdown a:last-child { border-bottom: none; }
.dropdown a:hover { background: #f4f7fa; color: var(--primary); }
.empty-row td { text-align: center; color: var(--text-muted); padding: 28px; font-size: 0.8rem; }

/* ── FOOTER ── */
#dash-footer {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  padding: 20px 24px; margin-bottom: 32px;
}
.foot-title { font-family: var(--font-head); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
.foot-list { list-style: none; }
.foot-list li { font-size: 0.75rem; color: var(--text); padding: 3px 0; border-bottom: 1px solid #f5f5f5; font-family: var(--font-mono); }
.foot-list li:last-child { border-bottom: none; }
.foot-contact p { font-size: 0.78rem; color: var(--text); line-height: 1.7; }
.foot-contact strong { color: var(--primary-dark); font-family: var(--font-head); font-size: 0.9rem; letter-spacing: 0.04em; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .metrics-grid { grid-template-columns: repeat(2,1fr); }
  .pipeline-grid { grid-template-columns: 1fr; }
  .pipeline-card { border-radius: 4px !important; margin-bottom: 4px; }
  .pipeline-card::after { content: '↓'; right: auto; left: 50%; transform: translateX(-50%); top: auto; bottom: -14px; }
  .two-col { grid-template-columns: 1fr; }
  .modules-grid { grid-template-columns: repeat(2,1fr); }
  #dash-footer { grid-template-columns: 1fr; }
  .tb-status { display: none; }
}
@media (max-width: 600px) {
  #main { padding: 14px; }
  .metrics-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
  .modules-grid { grid-template-columns: 1fr 1fr; }
  .tb-user-role { display: none; }
  .table-tabs { overflow-x: auto; }
}
@media (max-width: 480px) {
  #topbar { padding: 0 12px; gap: 10px; }
  .tb-brand-sub { display: none; }
  .tb-brand img { height: 28px; }
  .tb-brand-name { font-size: 1rem; }
  .tb-logout { font-size: 0.65rem; padding: 3px 6px; }
  .metric-value { font-size: 1.6rem; }
  .modules-grid { grid-template-columns: 1fr; }
  .two-col { grid-template-columns: 1fr; }
}
</style>
</head>

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
var phaseMap = {
  diagnostico: { label: 'Diagnóstico', color: '#888780' },
  revision:    { label: 'Revisión',    color: '#BA7517' },
  elaboracion: { label: 'Elaboración', color: '#1572b0' },
  obtencion:   { label: 'Obtención',   color: '#27a060' }
};
var statusColor = {
  'Aprobado':          '#27a060',
  'En trámite':        '#1572b0',
  'Con observaciones': '#BA7517',
  'Por renovar':       '#c0392b',
  'En revisión':       '#2190d7',
  'Vencido':           '#c0392b'
};

function daysUntil(dateStr) {
  var d = new Date(dateStr), now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

function fmtDate(dateStr) {
  var p = dateStr.split('-');
  return p[2] + '/' + p[1] + '/' + p[0];
}

/* ══════════════════════════════════════
   RENDER PIPELINE
══════════════════════════════════════ */
var activePhase = null;
var pg = document.getElementById('pipeline-grid');

function renderPipeline() {
  pg.innerHTML = '';
  D.pipeline.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'pipeline-card' + (activePhase === p.id ? ' active' : '');
    card.style.setProperty('--phase-color', p.color);
    card.innerHTML =
      '<div class="pipeline-phase-num" style="background:' + p.color + '">' + p.num + '</div>' +
      '<span class="pipeline-icon">' + p.icon + '</span>' +
      '<div class="pipeline-name">' + p.name + '</div>' +
      '<div class="pipeline-count"><strong>' + p.count + '</strong> expedientes</div>' +
      '<div class="pipeline-bar-bg"><div class="pipeline-bar-fill" style="width:' + p.progress + '%;background:' + p.color + '"></div></div>';
    card.addEventListener('click', function() {
      activePhase = (activePhase === p.id) ? null : p.id;
      renderPipeline();
      renderTable();
    });
    pg.appendChild(card);
  });
}
renderPipeline();

  var pct = Math.round(c.count / maxCat * 100);

  row.className = 'cat-row';
  row.innerHTML =

    '<div class="cat-name">' + c.name + '</div>' +
    '<div class="cat-bar-bg"><div class="cat-bar-fill" style="width:0%;background:' + c.color + '" data-w="' + pct + '"></div></div>' +
    '<div class="cat-count">' + c.count + '</div>';
  cl.appendChild(row);
});
setTimeout(function() {
  document.querySelectorAll('.cat-bar-fill').forEach(function(b) {

/* ══════════════════════════════════════
   RENDER TABLE
══════════════════════════════════════ */
var activeTab = 'todos';
var tabDefs = [
  { id: 'todos',        label: 'Todos'            },
  { id: 'tramite',      label: 'En trámite'       },
  { id: 'observaciones',label: 'Con observaciones'},
  { id: 'renovar',      label: 'Por renovar'      },
  { id: 'aprobados',    label: 'Aprobados'        }
];
var tabStatus = {
  tramite:       'En trámite',
  observaciones: 'Con observaciones',
  renovar:       'Por renovar',
  aprobados:     'Aprobado'
};

var tabsEl = document.getElementById('table-tabs');
tabDefs.forEach(function(t) {
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (t.id === activeTab ? ' active' : '');
  btn.textContent = t.label;
  btn.dataset.id = t.id;
  btn.addEventListener('click', function() {
    activeTab = t.id;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  });
  tabsEl.appendChild(btn);
});

function renderTable() {
  var tbody = document.getElementById('exp-tbody');
  tbody.innerHTML = '';
  var rows = D.expedientes.filter(function(e) {
    var tabOk = activeTab === 'todos' || (tabStatus[activeTab] && e.status === tabStatus[activeTab]);
    var phaseOk = !activePhase || e.fase === activePhase;
    return tabOk && phaseOk;
  });
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No hay expedientes para el filtro seleccionado.</td></tr>';
    return;
  }
  rows.forEach(function(e, i) {
    var days = daysUntil(e.venc);
    var vencClass = days <= 90 ? 'td-venc warn' : 'td-venc';
    var vencIcon = days <= 90 ? ' ⚠' : '';
    var ph = phaseMap[e.fase];
    var sc = statusColor[e.status] || '#888';
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><span class="td-code">' + e.code + '</span></td>' +
      '<td>' + e.product + '</td>' +
      '<td><span class="cat-badge" style="background:' + e.catC + '22;color:' + e.catC + '">' + e.cat + '</span></td>' +
      '<td><span class="pill" style="background:' + ph.color + '22;color:' + ph.color + '">' + ph.label + '</span></td>' +
      '<td>' + e.cliente + '</td>' +
      '<td style="font-family:var(--font-mono);font-size:0.72rem">' + e.norm + '</td>' +
      '<td class="' + vencClass + '">' + fmtDate(e.venc) + vencIcon + '</td>' +
      '<td><span class="pill" style="background:' + sc + '22;color:' + sc + '">' + e.status + '</span></td>' +
      '<td style="position:relative">' +
        '<button class="actions-btn" onclick="toggleMenu(this)">⋯</button>' +
        '<div class="dropdown">' +
          '<a href="#">Ver expediente</a>' +
          '<a href="#">Descargar matriz</a>' +
          '<a href="#">Registrar observación</a>' +
          '<a href="#">Iniciar renovación</a>' +
        '</div>' +
      '</td>';
    tbody.appendChild(tr);
  });
}
renderTable();

function toggleMenu(btn) {
  var dd = btn.nextElementSibling;
  var isOpen = dd.classList.contains('open');
  document.querySelectorAll('.dropdown.open').forEach(function(d){ d.classList.remove('open'); });
  if (!isOpen) dd.classList.add('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('actions-btn')) {
    document.querySelectorAll('.dropdown.open').forEach(function(d){ d.classList.remove('open'); });
  }
});
